<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — Excel Accounting Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; color: #1e293b; background: #f8fafc; padding: 100px 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .checkout-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; margin-bottom: 24px; color: #0f172a; }
        .order-summary { background: #dcfce7; padding: 24px; border-radius: 12px; margin-bottom: 24px; text-align: center; }
        .order-summary p { margin-bottom: 8px; }
        .price { font-size: 32px; font-weight: 800; color: #0f172a; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; }
        input:focus { outline: none; border-color: #217346; }
        .btn { width: 100%; padding: 16px; background: #217346; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #185c37; }
        .secure { text-align: center; margin-top: 16px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkout-card">
            <h1>Complete Your Order</h1>
            <div class="order-summary">
                <p>Plan: <strong id="planName">PRO</strong></p>
                <p class="price" id="planPrice">$397</p>
            </div>
            <form>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" placeholder="John Smith" required>
                </div>
                <button type="submit" class="btn">Pay $<span id="payAmount">397</span> — Download Now</button>
            </form>
            <p class="secure">🔒 Secure payment with Stripe. SSL encrypted.</p>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const plan = params.get('plan') || 'pro';
        document.getElementById('planName').textContent = plan.toUpperCase();
        document.getElementById('planPrice').textContent = plan === 'base' ? '$197' : '$397';
        document.getElementById('payAmount').textContent = plan === 'base' ? '197' : '397';
    </script>
</body>
</html>
